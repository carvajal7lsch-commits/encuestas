version: '3.8'

services:
  db:
    image: postgres:15
    container_name: modulocrud_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: modulocrud
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    container_name: modulocrud_backend
    restart: always
    depends_on:
      - db
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: modulocrud
      DB_PORT: 5432
      JWT_SECRET: super_secret_jwt_key
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: modulocrud_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
