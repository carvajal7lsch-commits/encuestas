version: '3.8'

services:
  db:
    image: postgres:15
    container_name: encuestas_vps_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: modulocrud
    volumes:
      - encuestas_pgdata:/var/lib/postgresql/data
    ports:
      - "5489:5432" # Puerto BD cambiado a 5489

  backend:
    build: ./backend
    container_name: encuestas_vps_backend
    restart: always
    depends_on:
      - db
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: modulocrud
      DB_PORT: 5432
      JWT_SECRET: super_secret_jwt_key
    ports:
      - "3089:3000" # Puerto API cambiado a 3089

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: encuestas_vps_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8089:80" # Puerto Web cambiado a 8089

volumes:
  encuestas_pgdata:
