version: '3.8'

services:
  db:
    image: postgres:15
    container_name: modulo_encuestas_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: modulocrud
    volumes:
      - encuestas_pgdata:/var/lib/postgresql/data
    ports:
      - "8897:5432" # Puerto BD cambiado a 8897 (Libre)

  backend:
    build: ./backend
    container_name: modulo_encuestas_backend
    restart: always
    depends_on:
      - db
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: modulocrud
      DB_PORT: 5432
      JWT_SECRET: super_secret_jwt_key
    ports:
      - "8896:3000" # Puerto API cambiado a 8896 (Libre)

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: modulo_encuestas_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8895:80" # Puerto Web cambiado a 8895 (Libre)

volumes:
  encuestas_pgdata:
