version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: modulocrud
    volumes:
      - encuestas_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: modulocrud
      DB_PORT: 5432
      JWT_SECRET: super_secret_jwt_key

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    restart: always
    depends_on:
      - backend

volumes:
  encuestas_pgdata: